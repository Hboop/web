<!DOCTYPE html>
<html>
<head>
  <title>HBR687.com</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      color: #ccc;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      overflow: hidden;
    }

    .line {
      opacity: 0;
      margin: 10px 0;
    }

    .big {
      font-size: 3rem;
      font-weight: bold;
    }

    .medium {
      font-size: 1.5rem;
      font-weight: normal;
    }

    .small {
      font-size: 1.1rem;
      font-weight: lighter;
    }

    .bottom {
      font-size: 1.3rem;
      margin-top: 50px;
    }

    /* Fade-in animation */
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="line big" style="animation: fadeIn 1s ease forwards; animation-delay: 0s;">HBR687.com</div>
  <div class="line medium" style="animation: fadeIn 1s ease forwards; animation-delay: 1s;">you really typed out that whole domain</div>
  <div class="line small" style="animation: fadeIn 1s ease forwards; animation-delay: 2s;">and little did you realize</div>
  <div class="line small" style="animation: fadeIn 1s ease forwards; animation-delay: 3s;">you completely wasted your time</div>
  <div class="line bottom" style="animation: fadeIn 1s ease forwards; animation-delay: 4s;">you are quite nosy, aren't you?</div>
</body>
</html>
